name: Bug report
description: Report something broken in the suite or a public tool.
title: '[Bug]: '
labels: ['bug', 'needs triage']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - open-access-uk-site
        - letter-generator
        - accessible-forms
        - public-service-directory
        - legal-templates
        - design-system
        - maintainer-helper
        - root suite
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include browser, viewport size, and exact clicks or input where useful.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or safety impact
      description: Did this expose personal data, generated content, or misleading public-service guidance?
