name: Source Freshness

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  validate-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-sources.mjs
      - run: node scripts/validate-repositories.mjs
      - run: node scripts/validate-features.mjs
      - run: node scripts/validate-deadline-rules.mjs
