name: Quality

on:
  pull_request:

jobs:
  static-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run validate:sources
      - run: npm run validate:repositories
      - run: npm run validate:features
      - run: npm run validate:deadlines
      - run: npm run validate:shared
      - run: npm run quality:static
      - run: npm run format:check
